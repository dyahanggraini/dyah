<!DOCTYPE HTML>
<html>
	<head>
		<title>Dyah | Indonesian in Iceland</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<div id="wrapper">

				<header id="header">
						<div class="logo">
							<span class="icon fa-gem"></span>
						</div>
						<div class="content">
							<div class="inner">
								<h1>Indonesian in Iceland</h1>
								<p>Welcome to my personal corner of the web.</p>
							</div>
						</div>
						<nav>
							<ul>
								
								<li><a href="#contact">Contact</a></li>
							</ul>
						</nav>
					</header>

				<div id="main">

						
						<article id="contact">
								<h2 class="major">Contact</h2>
								<form method="post" action="#">
									<div class="fields">
										<div class="field half">
											<label for="name">Name</label>
											<input type="text" name="name" id="name" />
										</div>
										<div class="field half">
											<label for="email">Email</label>
											<input type="text" name="email" id="email" />
										</div>
										<div class="field">
											<label for="message">Message</label>
											<textarea name="message" id="message" rows="4"></textarea>
										</div>
									</div>
									<ul class="actions">
										<li><input type="submit" value="Send Message" class="primary" /></li>
										<li><input type="reset" value="Reset" /></li>
									</ul>
								</form>
								<ul class="icons">
									<li><a href="https://github.com/dyahanggraini" class="icon brands fa-github"><span class="label">GitHub</span></a></li>
									<li><a href="https://www.instagram.com/dyah/" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
									<li><a href="https://www.facebook.com/choliqsdottir/" class="icon brands fa-facebook-f"><span class="label">Facebook</span></a></li>

								</ul>
							</article>

					</div>

				<footer id="footer">
						<p class="copyright">&copy; Dyah. All rights reserved. Design: <a href="https://html5up.net">HTML5 UP</a>.</p>
					</footer>

			</div>

		<div id="bg"></div>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

	</body>
</html>
